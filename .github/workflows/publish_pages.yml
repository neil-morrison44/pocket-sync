name: Publish Pages

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  merged_platform_zips:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm uninstall tauri-plugin-log-api
      - run: npm ci
      - run: npx tsc .github/workflows/scripts/build_platforms_zip.ts --target esnext --module commonjs --skipLibCheck
      - run: mv .github/workflows/scripts/build_platforms_zip.js .github/workflows/scripts/build_platforms_zip.cjs
      - uses: actions/github-script@v8
        with:
          script: |
            const { buildPlatformZip } = require(".github/workflows/scripts/build_platforms_zip.cjs")
            await buildPlatformZip({ github })
      - uses: actions/upload-artifact@v5
        with:
          name: platform-zip
          path: ./platforms.zip
      - uses: actions/upload-artifact@v5
        with:
          name: image-packs
          path: ./image_packs.json

      - name: Fetch Sponsor Count
        uses: actions/github-script@v8
        with:
          script: |
            const query = `
              query {
                user(login: "neil-morrison44") {
                  sponsorshipsAsMaintainer {
                    totalCount
                  }
                }
              }
            `;
            const result = await github.graphql(query);
            const count = result.user.sponsorshipsAsMaintainer.totalCount;

            const fs = require('fs');
            fs.writeFileSync('sponsors.json', JSON.stringify({ count }));
            console.log(`Saved sponsor count: ${count}`);

      - uses: actions/upload-artifact@v5
        with:
          name: sponsors-data
          path: ./sponsors.json

  publish_page:
    runs-on: ubuntu-latest
    needs: merged_platform_zips
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - uses: actions/download-artifact@v6
        with:
          name: platform-zip
          path: ./site

      - uses: actions/download-artifact@v6
        with:
          name: image-packs
          path: ./site

      - uses: actions/download-artifact@v6
        with:
          name: sponsors-data
          path: ./site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
